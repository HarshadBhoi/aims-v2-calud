# REFERENCE IMPLEMENTATION — OpenTelemetry Collector DaemonSet config.
#
# Runs on every EKS node. Receives OTLP from app pods (via localhost gRPC),
# batches, redacts PII, tail-samples traces, and exports to:
#   - Amazon Managed Prometheus (metrics)
#   - Grafana Tempo (traces)
#   - Loki (logs) — or CloudWatch via awscloudwatchlogs exporter
#   - Sentry (errors via log-severity filter)
#
# Deployment:
#   helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
#     -n observability --values this-file.yaml

mode: daemonset
image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.108.0

# IRSA for AWS exporters (AMP, CloudWatch, S3 archive).
serviceAccount:
  create: true
  name: otel-collector
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/otel-collector-production

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 500m, memory: 512Mi }

# Must tolerate control-plane taints so DaemonSet hits every node.
tolerations:
  - operator: Exists

# Expose OTLP receiver on localhost — pods dial 127.0.0.1:4317.
hostNetwork: false
hostPort:
  enabled: false

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

config:
  # ──────────────────────────────────────────────────────────────────────
  # Receivers — what comes IN
  # ──────────────────────────────────────────────────────────────────────
  receivers:
    # OTLP from app pods.
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
          max_recv_msg_size_mib: 32
        http:
          endpoint: 0.0.0.0:4318

    # Prometheus scrape of pods annotated prometheus.io/scrape=true.
    prometheus:
      config:
        scrape_configs:
          - job_name: "kubernetes-pods"
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: "true"
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: ([^:]+)(?::\d+)?;(\d+)
                replacement: $1:$2
                target_label: __address__
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod

    # Collect kubelet cAdvisor metrics (container CPU/mem/net).
    kubeletstats:
      collection_interval: 30s
      auth_type: serviceAccount
      endpoint: https://${env:K8S_NODE_NAME}:10250
      insecure_skip_verify: true
      metric_groups: [pod, container]

    # Host metrics (node-level CPU/mem/disk/network).
    hostmetrics:
      collection_interval: 30s
      scrapers:
        cpu: {}
        memory: {}
        disk: {}
        network: {}
        filesystem: {}

    # Pod logs — filelog receiver reads /var/log/pods.
    filelog:
      include: [/var/log/pods/*/*/*.log]
      exclude: [/var/log/pods/*/otel-collector/*.log]
      start_at: end
      include_file_path: true
      include_file_name: false
      operators:
        - type: container
          id: container-parser
        - type: move
          from: attributes.log
          to: body

  # ──────────────────────────────────────────────────────────────────────
  # Processors — what happens IN FLIGHT
  # ──────────────────────────────────────────────────────────────────────
  processors:
    # Add k8s metadata (pod, namespace, node) to everything.
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
        labels:
          - tag_name: app.label.component
            key: app.kubernetes.io/component
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: connection

    # Resource attributes always present.
    resource:
      attributes:
        - key: deployment.environment
          value: production
          action: upsert
        - key: cloud.provider
          value: aws
          action: upsert
        - key: cloud.region
          from_attribute: k8s.cluster.region
          action: upsert

    # Redact PII + obvious secrets that slipped into logs/attributes.
    attributes/redact:
      actions:
        - key: http.request.header.authorization
          action: delete
        - key: http.request.header.cookie
          action: delete
        - key: db.statement
          action: hash      # log query shape, not literal values
        # Block anything that looks like a secret.
        - pattern: "(password|secret|token|api_key|apikey)"
          action: delete

    # Redact common PII patterns from log bodies.
    transform/logs-scrub:
      log_statements:
        - context: log
          statements:
            # SSN pattern
            - replace_pattern(body, "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED-SSN]")
            # Credit card (basic Luhn-ish)
            - replace_pattern(body, "\\b(?:\\d[ -]*?){13,16}\\b", "[REDACTED-CC]")
            # Bearer tokens
            - replace_pattern(body, "Bearer [A-Za-z0-9._~+/=-]+", "Bearer [REDACTED]")

    # Batch before export — efficiency + backpressure.
    batch:
      send_batch_size: 10000
      send_batch_max_size: 11000
      timeout: 10s

    # Memory limiter — prevents OOM from runaway traffic.
    memory_limiter:
      check_interval: 1s
      limit_mib: 400
      spike_limit_mib: 100

    # Tail-sampling traces: keep all errors + slow + 10% random.
    tail_sampling:
      decision_wait: 10s
      num_traces: 10000
      policies:
        - name: errors
          type: status_code
          status_code: { status_codes: [ERROR] }
        - name: slow
          type: latency
          latency: { threshold_ms: 1000 }
        - name: auth-flows
          type: string_attribute
          string_attribute:
            key: http.route
            values: ["/api/auth/.*"]
        - name: random-10pct
          type: probabilistic
          probabilistic: { sampling_percentage: 10 }

  # ──────────────────────────────────────────────────────────────────────
  # Exporters — where telemetry GOES
  # ──────────────────────────────────────────────────────────────────────
  exporters:
    # Metrics → Amazon Managed Prometheus.
    prometheusremotewrite:
      endpoint: https://aps-workspaces.us-east-1.amazonaws.com/workspaces/ws-1234/api/v1/remote_write
      auth:
        authenticator: sigv4auth
      resource_to_telemetry_conversion:
        enabled: true

    # Traces → Grafana Tempo (managed or self-hosted).
    otlp/tempo:
      endpoint: tempo.grafana.aims.internal:4317
      tls: { insecure: false }
      sending_queue: { enabled: true, num_consumers: 4, queue_size: 1000 }
      retry_on_failure: { enabled: true, initial_interval: 5s, max_interval: 30s, max_elapsed_time: 5m }

    # Logs → Loki (via OTLP-to-Loki).
    otlphttp/loki:
      endpoint: https://logs.grafana.aims.internal/otlp
      auth:
        authenticator: basicauth/loki

    # Errors → Sentry (log severity=ERROR routed here).
    sentry:
      dsn: ${env:SENTRY_DSN}
      environment: production

    # Fallback: CloudWatch Logs (kept as backup of Loki).
    awscloudwatchlogs:
      log_group_name: /aims/production/otel
      log_stream_name: ${env:K8S_NODE_NAME}
      region: us-east-1
      raw_log: false

    # Metrics → separate CloudWatch for AWS-native alerting.
    awsemf:
      region: us-east-1
      namespace: AIMS/Production
      log_group_name: /aims/production/metrics

    # Health / debug (development only — removed in prod override).
    debug:
      verbosity: normal

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    pprof:
      endpoint: 0.0.0.0:1777
    sigv4auth:
      region: us-east-1
      service: aps
    basicauth/loki:
      client_auth:
        username: ${env:LOKI_USER}
        password: ${env:LOKI_PASS}

  # ──────────────────────────────────────────────────────────────────────
  # Pipelines — receiver → processors → exporter(s)
  # ──────────────────────────────────────────────────────────────────────
  service:
    extensions: [health_check, pprof, sigv4auth, basicauth/loki]
    telemetry:
      logs: { level: info }
      metrics: { level: detailed }

    pipelines:
      traces:
        receivers: [otlp]
        processors:
          - memory_limiter
          - k8sattributes
          - resource
          - attributes/redact
          - tail_sampling
          - batch
        exporters: [otlp/tempo]

      metrics:
        receivers: [otlp, prometheus, kubeletstats, hostmetrics]
        processors:
          - memory_limiter
          - k8sattributes
          - resource
          - batch
        exporters: [prometheusremotewrite, awsemf]

      logs:
        receivers: [otlp, filelog]
        processors:
          - memory_limiter
          - k8sattributes
          - resource
          - attributes/redact
          - transform/logs-scrub
          - batch
        exporters: [otlphttp/loki, awscloudwatchlogs, sentry]

# Env vars populated by downward API + secret refs.
extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
  - name: SENTRY_DSN
    valueFrom: { secretKeyRef: { name: otel-secrets, key: sentry-dsn } }
  - name: LOKI_USER
    valueFrom: { secretKeyRef: { name: otel-secrets, key: loki-user } }
  - name: LOKI_PASS
    valueFrom: { secretKeyRef: { name: otel-secrets, key: loki-pass } }

# Mount /var/log for filelog receiver.
extraVolumes:
  - name: varlog
    hostPath: { path: /var/log }
  - name: varlibdockercontainers
    hostPath: { path: /var/lib/docker/containers }
extraVolumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
