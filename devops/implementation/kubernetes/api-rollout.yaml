# REFERENCE IMPLEMENTATION — API service with Argo Rollouts canary delivery.
#
# Replaces a Deployment with a Rollout. Progresses 1% → 5% → 25% → 100%
# with SLO analysis gates between each step. Any failing gate aborts +
# flips traffic back to stable pods.
#
# File location in real tree:
#   infrastructure/helm/aims-v2/charts/api/templates/rollout.yaml
#   infrastructure/helm/aims-v2/charts/api/templates/analysis-template.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: aims
  labels:
    name: aims
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# ServiceAccount with IRSA annotation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aims-api
  namespace: aims
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/aims-api-production

---
# External secrets — pulls from AWS Secrets Manager at runtime.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-secrets
  namespace: aims
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: aws-secrets
    kind: ClusterSecretStore
  target:
    name: api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /aims/production/api/db-credentials
        property: connection_string
    - secretKey: REDIS_URL
      remoteRef:
        key: /aims/production/api/redis-url
    - secretKey: JWT_SIGNING_KEY_CURRENT
      remoteRef:
        key: /aims/production/platform/jwt-signing-key-current
    - secretKey: JWT_SIGNING_KEY_PREVIOUS
      remoteRef:
        key: /aims/production/platform/jwt-signing-key-previous
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: /aims/production/api/stripe-secret-key
    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: /aims/production/api/sendgrid-api-key

---
# Non-secret config (checked in to Git).
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: aims
data:
  NODE_ENV: "production"
  PORT: "4000"
  METRICS_PORT: "4001"
  LOG_LEVEL: "info"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4317"
  AWS_REGION: "us-east-1"
  ALLOWED_ORIGINS: "https://aims.io,https://*.aims.io"

---
# Services — stable + canary front the rollout.
apiVersion: v1
kind: Service
metadata:
  name: api-stable
  namespace: aims
spec:
  selector: { app: api }
  ports:
    - { name: http, port: 80, targetPort: 4000 }
---
apiVersion: v1
kind: Service
metadata:
  name: api-canary
  namespace: aims
spec:
  selector: { app: api }
  ports:
    - { name: http, port: 80, targetPort: 4000 }

---
# Canary rollout.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: aims
spec:
  replicas: 10
  revisionHistoryLimit: 5

  selector:
    matchLabels: { app: api }

  strategy:
    canary:
      canaryService: api-canary
      stableService: api-stable
      trafficRouting:
        alb:
          ingress: aims-ingress
          servicePort: 80
          annotationPrefix: alb.ingress.kubernetes.io
      steps:
        - setWeight: 1
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: api-slo-check
            args:
              - name: canary-service
                value: api-canary

        - setWeight: 5
        - pause: { duration: 5m }
        - analysis:
            templates: [{ templateName: api-slo-check }]
            args: [{ name: canary-service, value: api-canary }]

        - setWeight: 25
        - pause: { duration: 10m }
        - analysis:
            templates: [{ templateName: api-slo-check }]
            args: [{ name: canary-service, value: api-canary }]

        - setWeight: 100
      maxSurge: "25%"
      maxUnavailable: 0

  template:
    metadata:
      labels: { app: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: aims-api
      terminationGracePeriodSeconds: 60

      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: api } }

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector: { matchLabels: { app: api } }

      nodeSelector:
        role: app

      containers:
        - name: api
          # Image pinned by tag + digest (cosign verified by Kyverno).
          image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/aims/api:v1.2.3@sha256:abc123def456
          imagePullPolicy: IfNotPresent

          ports:
            - { name: http,    containerPort: 4000 }
            - { name: metrics, containerPort: 4001 }

          envFrom:
            - configMapRef: { name: api-config }
            - secretRef:    { name: api-secrets }
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: APP_VERSION
              value: v1.2.3
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=aims-api,service.version=$(APP_VERSION),k8s.pod.name=$(POD_NAME),k8s.node.name=$(NODE_NAME),k8s.namespace.name=$(POD_NAMESPACE)"

          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits:   { cpu: 2000m, memory: 2Gi }

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities: { drop: ["ALL"] }

          startupProbe:
            httpGet: { path: /livez, port: http }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /livez, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                # Graceful: ALB deregister takes ~30s. Wait before process exit.
                command: ["/bin/sleep", "30"]

          volumeMounts:
            - { name: tmp,   mountPath: /tmp }
            - { name: cache, mountPath: /app/.cache }

      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 100Mi }
        - name: cache
          emptyDir: { sizeLimit: 200Mi }

---
# SLO analysis template — referenced by Rollout steps.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-slo-check
  namespace: aims
spec:
  args:
    - name: canary-service
  metrics:
    # 1) Error rate must stay below 1%.
    - name: error-rate
      interval: 1m
      initialDelay: 1m
      successCondition: result[0] < 0.01
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.observability:9090
          query: |
            sum(rate(http_server_request_count{
              service="aims-api",
              k8s_service="{{args.canary-service}}",
              status=~"5.."
            }[2m]))
            /
            sum(rate(http_server_request_count{
              service="aims-api",
              k8s_service="{{args.canary-service}}"
            }[2m]))

    # 2) p99 latency must stay under 800 ms.
    - name: p99-latency
      interval: 1m
      initialDelay: 1m
      successCondition: result[0] < 800
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.observability:9090
          query: |
            histogram_quantile(
              0.99,
              sum by (le) (rate(http_server_request_duration_ms_bucket{
                service="aims-api",
                k8s_service="{{args.canary-service}}"
              }[2m]))
            )

    # 3) CPU utilization on canary pods should not saturate
    #    (indicates the new version is disproportionately expensive).
    - name: canary-cpu
      interval: 1m
      initialDelay: 2m
      successCondition: result[0] < 0.85
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.observability:9090
          query: |
            avg(rate(container_cpu_usage_seconds_total{
              namespace="aims",
              pod=~"api-.*",
              container="api"
            }[2m]))

---
# HPA for the stable ReplicaSet. Autoscaler sees traffic → adjusts replicas.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: aims
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: api
  minReplicas: 4
  maxReplicas: 40
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
    - type: Pods
      pods:
        metric: { name: http_server_request_count }
        target: { type: AverageValue, averageValue: "100" }
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - { type: Percent, value: 100, periodSeconds: 15 }
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - { type: Percent, value: 10, periodSeconds: 60 }

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api
  namespace: aims
spec:
  minAvailable: 75%
  selector:
    matchLabels: { app: api }

---
# ServiceMonitor — Prometheus Operator picks up metrics endpoint.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api
  namespace: aims
spec:
  selector:
    matchLabels: { app: api }
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scheme: http

---
# NetworkPolicy — only ingress controller may talk to api; api may talk to
# DB subnet and Redis subnet and DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api
  namespace: aims
spec:
  podSelector:
    matchLabels: { app: api }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { name: ingress } }
      ports:
        - { port: 4000 }
        - { port: 4001 }   # metrics scrape from prometheus ns
    - from:
        - namespaceSelector: { matchLabels: { name: observability } }
      ports:
        - { port: 4001 }
  egress:
    # Cluster DNS
    - to:
        - namespaceSelector: { matchLabels: { name: kube-system } }
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    # Database
    - to:
        - ipBlock: { cidr: 10.20.20.0/24 }
      ports:
        - { port: 5432 }
    # Redis
    - to:
        - ipBlock: { cidr: 10.20.20.0/24 }
      ports:
        - { port: 6379 }
    # Internal services (other aims pods)
    - to:
        - namespaceSelector: { matchLabels: { name: aims } }
    # Observability — OTel Collector
    - to:
        - namespaceSelector: { matchLabels: { name: observability } }
      ports:
        - { port: 4317 }   # OTLP gRPC
    # AWS APIs (via VPC endpoints typically)
    - to:
        - ipBlock: { cidr: 0.0.0.0/0 }
      ports:
        - { port: 443 }
